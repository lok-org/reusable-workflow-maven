name: Java Build workflow with Maven

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        default: '17'
      maven_command:
        required: false
        type: string
        default: mvn clean package
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup code 
        uses: actions/checkout@v4
      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}
          cache: 'maven'
      - name: Build the Package with maven
        run: ${{ inputs.maven_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: java-jar-file
          path: '**/target/*.jar'

